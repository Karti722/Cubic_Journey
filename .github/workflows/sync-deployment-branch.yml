name: Sync deployment branch

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      source_ref:
        description: "Branch or tag to mirror into deployment"
        required: true
        default: "main"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      TARGET_BRANCH: deployment
      SOURCE_REF: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.source_ref || github.ref_name }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Validate source ref exists on origin
        run: |
          git fetch origin "${SOURCE_REF}" --depth=1

      - name: Force-sync deployment branch from source ref
        run: |
          git checkout --detach "origin/${SOURCE_REF}"
          git push origin HEAD:refs/heads/${TARGET_BRANCH} --force
