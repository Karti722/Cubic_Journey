<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Three.js Platformer</title>
  <style>
    body { margin: 0; overflow: hidden; background: #000; }
    #ui {
      position: fixed; top: 12px; left: 12px;
      color: white; font-family: sans-serif;
      background: rgba(0,0,0,.45); padding: 10px;
    }
  </style>
</head>
<body>
<div id="ui">WASD move · Space jump · Reach the green cube</div>

<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js";

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

const camera = new THREE.PerspectiveCamera(70, innerWidth / innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 2));

const sun = new THREE.DirectionalLight(0xffffff, 2);
sun.position.set(5, 10, 5);
scene.add(sun);

const keys = {};
addEventListener("keydown", e => keys[e.code] = true);
addEventListener("keyup", e => keys[e.code] = false);

const player = new THREE.Mesh(
  new THREE.BoxGeometry(1, 1, 1),
  new THREE.MeshStandardMaterial({ color: 0xff4444 })
);
player.position.set(0, 3, 0);
scene.add(player);

const platforms = [];
function platform(x, y, z, sx, sy, sz, color = 0x777777) {
  const mesh = new THREE.Mesh(
    new THREE.BoxGeometry(sx, sy, sz),
    new THREE.MeshStandardMaterial({ color })
  );
  mesh.position.set(x, y, z);
  scene.add(mesh);
  platforms.push(mesh);
}

platform(0, 0, 0, 10, 1, 10);
platform(8, 2, 0, 5, 1, 5);
platform(15, 4, -3, 5, 1, 5);
platform(22, 6, 2, 5, 1, 5);
platform(30, 8, 0, 6, 1, 6, 0x44aa44);

const goal = new THREE.Mesh(
  new THREE.BoxGeometry(1.5, 1.5, 1.5),
  new THREE.MeshStandardMaterial({ color: 0x00ff66 })
);
goal.position.set(30, 10, 0);
scene.add(goal);

let velocity = new THREE.Vector3();
let grounded = false;
let won = false;

const clock = new THREE.Clock();

function intersectsPlatform(p, plat) {
  const px = Math.abs(p.position.x - plat.position.x);
  const py = p.position.y - plat.position.y;
  const pz = Math.abs(p.position.z - plat.position.z);

  return (
    px < plat.geometry.parameters.width / 2 + 0.5 &&
    pz < plat.geometry.parameters.depth / 2 + 0.5 &&
    py > 0 &&
    py < 1.05
  );
}

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.033);

  const speed = 8;
  velocity.x = 0;
  velocity.z = 0;

  if (keys.KeyW) velocity.z -= speed;
  if (keys.KeyS) velocity.z += speed;
  if (keys.KeyA) velocity.x -= speed;
  if (keys.KeyD) velocity.x += speed;

  if (grounded && keys.Space) {
    velocity.y = 12;
    grounded = false;
  }

  velocity.y -= 25 * dt;
  player.position.addScaledVector(velocity, dt);

  grounded = false;
  for (const plat of platforms) {
    if (intersectsPlatform(player, plat) && velocity.y <= 0) {
      player.position.y = plat.position.y + 1;
      velocity.y = 0;
      grounded = true;
    }
  }

  if (player.position.y < -10) {
    player.position.set(0, 3, 0);
    velocity.set(0, 0, 0);
  }

  camera.position.lerp(
    new THREE.Vector3(
      player.position.x - 7,
      player.position.y + 5,
      player.position.z + 9
    ),
    0.08
  );
  camera.lookAt(player.position);

  goal.rotation.y += dt * 2;

  if (!won && player.position.distanceTo(goal.position) < 2) {
    won = true;
    document.getElementById("ui").textContent = "You win! Refresh to play again.";
  }

  renderer.render(scene, camera);
}

addEventListener("resize", () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

animate();
</script>
</body>
</html>
